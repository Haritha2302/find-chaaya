<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Find Chaaya</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: #fdf8f2;
      color: #2a1a0a;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────
       Now a flex row: title on the left, "Find my location"
       button on the right. Much more discoverable than the
       old floating circle icon.                             */
    header {
      padding: 10px 16px;
      background: #fdf8f2;
      border-bottom: 1px solid #e8d8c4;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-text { flex: 1; }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #2a1a0a;
    }

    header p {
      font-size: 12px;
      color: #8B6340;
      margin-top: 1px;
      font-style: italic;
    }

    /* ── Locate button ──────────────────────────────────────
       Moved from a floating circle icon to a clearly labelled
       pill button in the header. The pin emoji gives a quick
       visual cue without needing a custom icon file.         */
    #locate-btn {
      background: #f5ede0;
      border: 1px solid #e8d8c4;
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #5a3e28;
      cursor: pointer;
      font-family: 'Georgia', serif;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #locate-btn:active { background: #C8874A; color: white; }

    /* ── Filter bar ─────────────────────────────────────────
       Star tap filters. Each row has a label, 5 tappable
       stars, and an "Any" reset pill.
       How it works: tapping star N sets the minimum rating
       to N. Stars 1..N turn amber; N+1..5 stay grey.
       Tapping "Any" resets the filter (min = 0).            */
    #filter-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: #fdf8f2;
      border-bottom: 1px solid #e8d8c4;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filter-group label {
      font-size: 11px;
      font-weight: 600;
      color: #8B6340;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      white-space: nowrap;
    }

    /* The 5 tappable stars per filter */
    .filter-stars { display: flex; gap: 1px; }

    .filter-star {
      font-size: 20px;
      cursor: pointer;
      color: #ddd;
      line-height: 1;
      padding: 2px 1px;
      user-select: none;
      transition: color 0.1s;
    }

    .filter-star.active { color: #C8874A; }

    /* "Any" pill resets that filter */
    .filter-any {
      font-size: 11px;
      color: #8B6340;
      background: none;
      border: 1px solid #e8d8c4;
      border-radius: 20px;
      padding: 3px 9px;
      cursor: pointer;
      font-family: 'Georgia', serif;
    }

    .filter-any.dimmed { opacity: 0.4; }

    #shop-count {
      margin-left: auto;
      font-size: 11px;
      color: #a0856a;
      white-space: nowrap;
    }

    /* ── Map ──────────────────────────────────────────────── */
    #map {
      flex: 1;
      width: 100%;
      min-height: 0;
    }

    /* ── Marker wrap ────────────────────────────────────────
       The exported PNG has a black background. Rather than
       trying to make black transparent (which would also
       affect the dark parts of the glass illustration), we
       wrap the image in a white pill shape. The pill gives
       the marker a clean, map-friendly look with a subtle
       shadow so it lifts off the map tiles.                 */
    .chai-marker-wrap {
      width: 38px;
      height: 46px;
      background: white;
      border-radius: 50% 50% 44% 44% / 55% 55% 45% 45%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid #ddd;
      box-shadow: 0 2px 6px rgba(0,0,0,0.18);
    }

    .chai-marker-wrap img {
      width: 26px;
      height: 32px;
      object-fit: contain;
    }

    /* Selected state: warm outline + stronger shadow */
    .chai-marker-wrap.selected {
      background: #fff8f0;
      border: 2px solid #C8874A;
      box-shadow: 0 3px 12px rgba(200,135,74,0.4);
    }

    /* ── Bottom info panel ────────────────────────────────── */
    #info-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fdf8f2;
      border-top: 1px solid #e8d8c4;
      border-radius: 16px 16px 0 0;
      padding: 16px 20px 28px;
      z-index: 1000;
      transform: translateY(100%);
      transition: transform 0.28s ease;
      max-width: 600px;
      margin: 0 auto;
    }

    #info-panel.open { transform: translateY(0); }

    .panel-handle {
      width: 36px;
      height: 4px;
      background: #d4c4b0;
      border-radius: 2px;
      margin: 0 auto 14px;
    }

    #panel-name {
      font-size: 18px;
      font-weight: 700;
      color: #2a1a0a;
    }

    #panel-location {
      font-size: 13px;
      color: #8B6340;
      margin-top: 2px;
    }

    #panel-ratings {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .rating-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #f5ede0;
      border-radius: 10px;
      padding: 8px 16px;
      min-width: 80px;
    }

    .rating-badge .badge-label {
      font-size: 10px;
      color: #8B6340;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .rating-badge .stars {
      font-size: 16px;
      color: #C8874A;
      margin-top: 3px;
      letter-spacing: 1px;
    }

    .rating-badge .rating-num {
      font-size: 11px;
      color: #a0856a;
      margin-top: 1px;
    }

    #panel-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      flex: 1;
      padding: 11px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary { background: #C8874A; color: white; }
    .btn-secondary { background: #f5ede0; color: #5a3e28; }

    #route-row {
      display: none;
      gap: 10px;
      margin-top: 10px;
    }

    #route-row.visible { display: flex; }

    .route-box {
      flex: 1;
      background: #f0e8d8;
      border-radius: 10px;
      padding: 8px 12px;
      text-align: center;
    }

    .route-box .route-label {
      font-size: 10px;
      color: #8B6340;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .route-box .route-val {
      font-size: 16px;
      font-weight: 700;
      color: #2a1a0a;
      margin-top: 2px;
    }

    /* ── Loading overlay ──────────────────────────────────── */
    #loading {
      position: fixed;
      inset: 0;
      background: #fdf8f2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    #loading h2 { font-size: 24px; color: #2a1a0a; margin-bottom: 6px; }
    #loading p { font-size: 13px; color: #8B6340; font-style: italic; }

    #loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e8d8c4;
      border-top-color: #C8874A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .leaflet-control-attribution { font-size: 9px !important; }
  </style>
</head>

<body>

  <div id="loading">
    <div id="loading-spinner"></div>
    <h2>Find Chaaya</h2>
    <p>by Le Chaaya</p>
  </div>

  <!-- Header: title + locate button side by side -->
  <header>
    <div class="header-text">
      <h1>Find Chaaya</h1>
      <p>by Le Chaaya</p>
    </div>
    <button id="locate-btn" onclick="locateMe()">📍 Find my location</button>
  </header>

  <!-- Filter bar: star-tap filters for taste and vibe -->
  <div id="filter-bar">
    <div class="filter-group">
      <label>Taste</label>
      <div class="filter-stars" id="taste-stars-filter">
        <span class="filter-star" data-val="1">★</span>
        <span class="filter-star" data-val="2">★</span>
        <span class="filter-star" data-val="3">★</span>
        <span class="filter-star" data-val="4">★</span>
        <span class="filter-star" data-val="5">★</span>
      </div>
      <button class="filter-any" id="taste-any" onclick="resetFilter('taste')">Any</button>
    </div>
    <div class="filter-group">
      <label>Vibe</label>
      <div class="filter-stars" id="vibe-stars-filter">
        <span class="filter-star" data-val="1">★</span>
        <span class="filter-star" data-val="2">★</span>
        <span class="filter-star" data-val="3">★</span>
        <span class="filter-star" data-val="4">★</span>
        <span class="filter-star" data-val="5">★</span>
      </div>
      <button class="filter-any" id="vibe-any" onclick="resetFilter('vibe')">Any</button>
    </div>
    <span id="shop-count"></span>
  </div>

  <div id="map"></div>

  <!-- Bottom sheet -->
  <div id="info-panel">
    <div class="panel-handle"></div>
    <div id="panel-name">Shop Name</div>
    <div id="panel-location">Area, City</div>
    <div id="panel-ratings">
      <div class="rating-badge">
        <span class="badge-label">Taste</span>
        <span class="stars" id="taste-stars"></span>
        <span class="rating-num" id="taste-num"></span>
      </div>
      <div class="rating-badge">
        <span class="badge-label">Vibe</span>
        <span class="stars" id="vibe-stars"></span>
        <span class="rating-num" id="vibe-num"></span>
      </div>
    </div>
    <div id="route-row">
      <div class="route-box">
        <div class="route-label">Distance</div>
        <div class="route-val" id="route-dist">—</div>
      </div>
      <div class="route-box">
        <div class="route-label">Walking</div>
        <div class="route-val" id="route-time">—</div>
      </div>
    </div>
    <div id="panel-actions">
      <a id="gmaps-btn" href="#" target="_blank" class="btn btn-primary">Open in Maps</a>
      <button class="btn btn-secondary" onclick="getRoute()">Get route</button>
      <button class="btn btn-secondary" onclick="closePanel()">Close</button>
    </div>
  </div>

  <script>
    // ============================================================
    // CONFIGURATION — paste your Apps Script Web App URL here
    // ============================================================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwo1VyT3C4QKiW1absjR5BdjTh7I4lW2q_tMii3IlSSh42cPotMNBl6z4DaBAu0gEIR/exec';

    // ============================================================
    // MARKER SETUP
    //
    // Instead of using L.icon() with a plain PNG (which shows
    // the black background from your export), we use L.divIcon().
    // divIcon lets us supply raw HTML as the marker. We wrap the
    // PNG in a styled <div class="chai-marker-wrap"> which gives
    // it a white pill background, border, and shadow — so it
    // looks clean on any map tile colour.
    // ============================================================
    function makeIcon(selected) {
      return L.divIcon({
        className: '',   // clear Leaflet's default white square background
        html: `<div class="chai-marker-wrap ${selected ? 'selected' : ''}">
                 <img src="marker.png" />
               </div>`,
        iconSize: [38, 46],
        iconAnchor: [19, 46],   // anchor at bottom-centre of the pill
        popupAnchor: [0, -46]
      });
    }

    const chaiIcon = makeIcon(false);
    const chaiIconSelected = makeIcon(true);

    // ============================================================
    // MAP SETUP
    // ============================================================
    const map = L.map('map', { zoomControl: true }).setView([9.98, 76.3], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // ============================================================
    // STATE
    // ============================================================
    let allShops = [];
    let markers = [];
    let selectedMarker = null;
    let userMarker = null;
    let routeLine = null;
    let activeShop = null;
    let tasteMin = 0;   // 0 = no filter (Any)
    let vibeMin = 0;

    // ============================================================
    // FETCH SHOP DATA
    // ============================================================
    fetch(SCRIPT_URL)
      .then(r => r.json())
      .then(data => {
        allShops = data.shops;
        renderMarkers(allShops);
        hideLoading();
      })
      .catch(err => {
        console.error('Failed to load shop data:', err);
        document.querySelector('#loading p').textContent = 'Could not load shops. Check the script URL.';
      });

    // ============================================================
    // RENDER MARKERS
    // ============================================================
    function renderMarkers(shops) {
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      shops.forEach(shop => {
        if (!shop.lat || !shop.lng) return;

        const marker = L.marker([shop.lat, shop.lng], { icon: chaiIcon }).addTo(map);
        marker.on('click', () => selectShop(shop, marker));
        markers.push(marker);
      });

      const n = shops.length;
      document.getElementById('shop-count').textContent =
        n === 1 ? '1 shop' : n + ' shops';
    }

    // ============================================================
    // SELECT A SHOP
    // ============================================================
    function selectShop(shop, marker) {
      if (selectedMarker) selectedMarker.setIcon(chaiIcon);
      marker.setIcon(chaiIconSelected);
      selectedMarker = marker;
      activeShop = shop;

      document.getElementById('panel-name').textContent = shop.name;
      document.getElementById('panel-location').textContent =
        [shop.area, shop.city, shop.state].filter(Boolean).join(', ');

      document.getElementById('taste-stars').innerHTML = starsFor(shop.taste);
      document.getElementById('taste-num').textContent = shop.taste + ' / 5';
      document.getElementById('vibe-stars').innerHTML = starsFor(shop.vibe);
      document.getElementById('vibe-num').textContent = shop.vibe + ' / 5';

      const gmapsBtn = document.getElementById('gmaps-btn');
      gmapsBtn.href = shop.gmaps || '#';
      gmapsBtn.style.display = shop.gmaps ? 'block' : 'none';

      document.getElementById('route-row').classList.remove('visible');
      document.getElementById('info-panel').classList.add('open');
      map.panTo([shop.lat, shop.lng]);
    }

    // ============================================================
    // HALF-STAR RENDERER
    //
    // Builds an HTML string of 5 stars where:
    // - val >= i         → filled amber star
    // - val >= i - 0.5   → half star (CSS gradient left=amber, right=grey)
    // - otherwise        → empty grey star
    // ============================================================
    function starsFor(n) {
      const val = Number(n);
      let html = '';
      for (let i = 1; i <= 5; i++) {
        if (val >= i) {
          html += '<span style="color:#C8874A">★</span>';
        } else if (val >= i - 0.5) {
          html += '<span style="background:linear-gradient(to right,#C8874A 50%,#ddd 50%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">★</span>';
        } else {
          html += '<span style="color:#ddd">★</span>';
        }
      }
      return html;
    }

    // ============================================================
    // CLOSE PANEL
    // ============================================================
    function closePanel() {
      document.getElementById('info-panel').classList.remove('open');
      if (selectedMarker) selectedMarker.setIcon(chaiIcon);
      selectedMarker = null;
      activeShop = null;
      if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
    }

    map.on('click', closePanel);

    // ============================================================
    // STAR TAP FILTERS
    //
    // Each star in the filter row has a data-val attribute (1–5).
    // When tapped, we set tasteMin (or vibeMin) to that value,
    // highlight stars 1..N in amber, then re-run applyFilters().
    //
    // setStarFilter(type, val) does the visual update.
    // applyFilters() does the data filtering + re-render.
    // resetFilter(type) sets min back to 0 and clears the stars.
    // ============================================================
    function setStarFilter(type, val) {
      const stars = document.querySelectorAll(`#${type}-stars-filter .filter-star`);
      stars.forEach(s => {
        s.classList.toggle('active', Number(s.dataset.val) <= val);
      });
      // Dim the "Any" button when a filter is active
      document.getElementById(`${type}-any`).classList.toggle('dimmed', val > 0);

      if (type === 'taste') tasteMin = val;
      else vibeMin = val;

      applyFilters();
    }

    function resetFilter(type) {
      setStarFilter(type, 0);
    }

    function applyFilters() {
      closePanel();
      const filtered = allShops.filter(s =>
        Number(s.taste) >= tasteMin && Number(s.vibe) >= vibeMin
      );
      renderMarkers(filtered);
    }

    // Wire up click handlers on all filter stars
    document.querySelectorAll('.filter-star').forEach(star => {
      star.addEventListener('click', () => {
        const type = star.closest('.filter-group').querySelector('label').textContent.toLowerCase();
        setStarFilter(type, Number(star.dataset.val));
      });
    });

    // ============================================================
    // GPS — FIND MY LOCATION
    // ============================================================
    function locateMe() {
      const btn = document.getElementById('locate-btn');
      btn.textContent = 'Locating...';
      if (!navigator.geolocation) {
        alert('Location not supported in this browser.');
        btn.textContent = '📍 Find my location';
        return;
      }
      navigator.geolocation.getCurrentPosition(pos => {
        const { latitude: lat, longitude: lng } = pos.coords;
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.circleMarker([lat, lng], {
          radius: 9,
          fillColor: '#4A90D9',
          fillOpacity: 1,
          color: 'white',
          weight: 2.5
        }).addTo(map);
        map.setView([lat, lng], 14);
        btn.textContent = '📍 Location found';
        setTimeout(() => btn.textContent = '📍 Find my location', 3000);
      }, () => {
        alert('Could not get your location. Please allow location access.');
        btn.textContent = '📍 Find my location';
      });
    }

    // ============================================================
    // WALKING ROUTE
    // ============================================================
    async function getRoute() {
      if (!activeShop) return;
      if (!userMarker) {
        alert('Tap "Find my location" first.');
        return;
      }

      const userLatLng = userMarker.getLatLng();
      const url = `https://router.project-osrm.org/route/v1/foot/` +
        `${userLatLng.lng},${userLatLng.lat};${activeShop.lng},${activeShop.lat}` +
        `?overview=full&geometries=geojson`;

      try {
        const res = await fetch(url);
        const data = await res.json();
        const route = data.routes[0];

        const distKm = (route.distance / 1000).toFixed(1);
        const mins = Math.round(route.duration / 60);
        const timeStr = mins >= 60
          ? `${Math.floor(mins / 60)}h ${mins % 60}m`
          : `${mins} min`;

        document.getElementById('route-dist').textContent = distKm + ' km';
        document.getElementById('route-time').textContent = timeStr;
        document.getElementById('route-row').classList.add('visible');

        if (routeLine) map.removeLayer(routeLine);
        routeLine = L.geoJSON(route.geometry, {
          style: { color: '#4A90D9', weight: 3, opacity: 0.85, dashArray: '6, 5' }
        }).addTo(map);

        const coords = route.geometry.coordinates;
        map.fitBounds(
          L.latLngBounds(coords.map(c => [c[1], c[0]])),
          { padding: [60, 60] }
        );
      } catch (e) {
        alert('Could not fetch route. Check your internet connection.');
      }
    }

    // ============================================================
    // HIDE LOADING SCREEN
    // ============================================================
    function hideLoading() {
      setTimeout(() => {
        const el = document.getElementById('loading');
        el.style.opacity = '0';
        setTimeout(() => el.style.display = 'none', 400);
      }, 300);
    }
  </script>
</body>
</html>
