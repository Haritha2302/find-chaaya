<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Find Chaaya</title>

  <!--
    Leaflet.js is the open-source map library we're using.
    It handles all the map rendering, zoom, pan, and markers.
    We load the CSS (styles) and JS (logic) from a CDN so
    we don't have to bundle them ourselves.
  -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* ── Reset & base ───────────────────────────────────────
       We remove all default browser padding/margin and set
       the page to fill the full screen. The map will take
       up most of the viewport height.                       */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: #fdf8f2;
      color: #2a1a0a;
      height: 100dvh;           /* dvh = dynamic viewport height, works on mobile */
      display: flex;
      flex-direction: column;   /* stack header → map → panel vertically */
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────
       The top bar with the app name and tagline.            */
    header {
      padding: 12px 20px 10px;
      background: #fdf8f2;
      border-bottom: 1px solid #e8d8c4;
      flex-shrink: 0;           /* don't let the header compress */
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #2a1a0a;
    }

    header p {
      font-size: 12px;
      color: #8B6340;
      margin-top: 1px;
      font-style: italic;
    }

    /* ── Filter bar ─────────────────────────────────────────
       The row of controls for filtering by taste/vibe rating.
       flex-shrink:0 ensures it never collapses.             */
    #filter-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      background: #fdf8f2;
      border-bottom: 1px solid #e8d8c4;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #5a3e28;
    }

    .filter-group label {
      white-space: nowrap;
      font-weight: 600;
    }

    /* The range slider — styled to match the warm colour palette */
    .filter-group input[type=range] {
      width: 80px;
      accent-color: #C8874A;
      cursor: pointer;
    }

    .filter-group span {
      min-width: 28px;
      font-size: 13px;
      font-weight: 700;
      color: #C8874A;
    }

    #shop-count {
      margin-left: auto;
      font-size: 11px;
      color: #a0856a;
      white-space: nowrap;
    }

    /* ── Map ────────────────────────────────────────────────
       flex:1 means the map takes all remaining vertical space
       after the header and filter bar are placed.           */
    #map {
      flex: 1;
      width: 100%;
      min-height: 0;            /* required for flex children to shrink */
    }

    /* ── Bottom info panel ──────────────────────────────────
       Slides up from the bottom when a shop marker is tapped.
       Uses transform to animate in/out smoothly.            */
    #info-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fdf8f2;
      border-top: 1px solid #e8d8c4;
      border-radius: 16px 16px 0 0;
      padding: 16px 20px 28px;
      z-index: 1000;
      transform: translateY(100%);   /* hidden below screen by default */
      transition: transform 0.28s ease;
      max-width: 600px;
      margin: 0 auto;
    }

    /* When the panel has class "open", slide it up into view */
    #info-panel.open {
      transform: translateY(0);
    }

    /* The small drag handle at the top of the panel */
    .panel-handle {
      width: 36px;
      height: 4px;
      background: #d4c4b0;
      border-radius: 2px;
      margin: 0 auto 14px;
    }

    #panel-name {
      font-size: 18px;
      font-weight: 700;
      color: #2a1a0a;
    }

    #panel-location {
      font-size: 13px;
      color: #8B6340;
      margin-top: 2px;
    }

    /* The row showing taste and vibe rating badges */
    #panel-ratings {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .rating-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #f5ede0;
      border-radius: 10px;
      padding: 8px 16px;
      min-width: 80px;
    }

    .rating-badge .badge-label {
      font-size: 10px;
      color: #8B6340;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    /* Stars rendered as filled/empty unicode stars */
    .rating-badge .stars {
      font-size: 16px;
      color: #C8874A;
      margin-top: 3px;
      letter-spacing: 1px;
    }

    .rating-badge .rating-num {
      font-size: 11px;
      color: #a0856a;
      margin-top: 1px;
    }

    /* The action buttons at the bottom of the panel */
    #panel-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      flex: 1;
      padding: 11px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: #C8874A;
      color: white;
    }

    .btn-secondary {
      background: #f5ede0;
      color: #5a3e28;
    }

    /* ── Loading overlay ────────────────────────────────────
       Shown while the app fetches shop data from the script.
       Fades out once data loads.                            */
    #loading {
      position: fixed;
      inset: 0;
      background: #fdf8f2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    #loading h2 {
      font-size: 24px;
      color: #2a1a0a;
      margin-bottom: 6px;
    }

    #loading p {
      font-size: 13px;
      color: #8B6340;
      font-style: italic;
    }

    #loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e8d8c4;
      border-top-color: #C8874A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── "Find me" button ───────────────────────────────────
       Floating button that triggers GPS location.          */
    #locate-btn {
      position: fixed;
      bottom: 24px;
      right: 16px;
      z-index: 999;
      background: white;
      border: 1px solid #e8d8c4;
      border-radius: 50%;
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    /* ── Route info bar ─────────────────────────────────────
       Shown inside the panel after a route is calculated.  */
    #route-row {
      display: none;
      gap: 10px;
      margin-top: 10px;
    }

    #route-row.visible { display: flex; }

    .route-box {
      flex: 1;
      background: #f0e8d8;
      border-radius: 10px;
      padding: 8px 12px;
      text-align: center;
    }

    .route-box .route-label {
      font-size: 10px;
      color: #8B6340;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .route-box .route-val {
      font-size: 16px;
      font-weight: 700;
      color: #2a1a0a;
      margin-top: 2px;
    }

    /* Leaflet attribution — keep it but make it small */
    .leaflet-control-attribution {
      font-size: 9px !important;
    }
  </style>
</head>

<body>

  <!-- Loading screen shown until data is fetched -->
  <div id="loading">
    <div id="loading-spinner"></div>
    <h2>Find Chaaya</h2>
    <p>by Le Chaaya</p>
  </div>

  <!-- Header -->
  <header>
    <h1>Find Chaaya</h1>
    <p>by Le Chaaya</p>
  </header>

  <!-- Filter controls -->
  <div id="filter-bar">
    <div class="filter-group">
      <label>Taste ≥</label>
      <input type="range" id="taste-filter" min="1" max="5" step="1" value="1" />
      <span id="taste-val">1</span>
    </div>
    <div class="filter-group">
      <label>Vibe ≥</label>
      <input type="range" id="vibe-filter" min="1" max="5" step="1" value="1" />
      <span id="vibe-val">1</span>
    </div>
    <span id="shop-count"></span>
  </div>

  <!-- The map renders into this div -->
  <div id="map"></div>

  <!-- Floating locate button -->
  <div id="locate-btn" onclick="locateMe()" title="Find my location">⊙</div>

  <!-- Bottom sheet panel for shop details -->
  <div id="info-panel">
    <div class="panel-handle"></div>
    <div id="panel-name">Shop Name</div>
    <div id="panel-location">Area, City</div>
    <div id="panel-ratings">
      <div class="rating-badge">
        <span class="badge-label">Taste</span>
        <span class="stars" id="taste-stars"></span>
        <span class="rating-num" id="taste-num"></span>
      </div>
      <div class="rating-badge">
        <span class="badge-label">Vibe</span>
        <span class="stars" id="vibe-stars"></span>
        <span class="rating-num" id="vibe-num"></span>
      </div>
    </div>
    <div id="route-row">
      <div class="route-box">
        <div class="route-label">Distance</div>
        <div class="route-val" id="route-dist">—</div>
      </div>
      <div class="route-box">
        <div class="route-label">Walking</div>
        <div class="route-val" id="route-time">—</div>
      </div>
    </div>
    <div id="panel-actions">
      <a id="gmaps-btn" href="#" target="_blank" class="btn btn-primary">Open in Maps</a>
      <button class="btn btn-secondary" onclick="getRoute()">Get route</button>
      <button class="btn btn-secondary" onclick="closePanel()">Close</button>
    </div>
  </div>

  <script>
    // ============================================================
    // CONFIGURATION — only line you need to change
    // Paste your Apps Script Web App URL below:
    // ============================================================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwo1VyT3C4QKiW1absjR5BdjTh7I4lW2q_tMii3IlSSh42cPotMNBl6z4DaBAu0gEIR/exec';

    // ============================================================
    // HOW THE MARKER IMAGE WORKS
    //
    // We use your chai glass PNG as the map marker.
    // Leaflet's L.icon() lets us define a custom image as a
    // marker. iconSize sets the display size on the map.
    // iconAnchor is the pixel point on the icon that corresponds
    // to the exact map location — [width/2, height] means the
    // tip at the bottom-centre of the image is the anchor point.
    // ============================================================
    const chaiIcon = L.icon({
      iconUrl: 'marker.png',
      iconSize: [40, 48],
      iconAnchor: [20, 48],
      popupAnchor: [0, -48]
    });

    // Same icon but slightly larger for the selected state
    const chaiIconSelected = L.icon({
      iconUrl: 'marker.png',
      iconSize: [50, 60],
      iconAnchor: [25, 60],
      popupAnchor: [0, -60]
    });

    // ============================================================
    // MAP INITIALISATION
    //
    // L.map('map') creates a Leaflet map inside the <div id="map">
    // setView([lat, lng], zoom) sets the starting position.
    // Zoom 12 = city level, 6 = country level.
    // We start centred on Kochi since all current shops are there.
    //
    // L.tileLayer() loads the map background tiles from
    // OpenStreetMap — the actual street map imagery.
    // {s} = subdomain, {z}/{x}/{y} = tile coordinates.
    // ============================================================
    const map = L.map('map', { zoomControl: true }).setView([9.98, 76.3], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // ============================================================
    // STATE VARIABLES
    //
    // These variables live in memory and track the current state
    // of the app — which shops are loaded, what's selected, etc.
    // ============================================================
    let allShops = [];           // all shops fetched from the sheet
    let markers = [];            // Leaflet marker objects on the map
    let selectedMarker = null;   // currently selected marker
    let userMarker = null;       // the blue dot showing your location
    let routeLine = null;        // the dashed route line on the map
    let activeShop = null;       // the shop currently shown in the panel

    // ============================================================
    // FETCHING SHOP DATA
    //
    // fetch() is the browser's built-in function to make HTTP
    // requests. We call your Apps Script URL, which returns JSON.
    // .then(r => r.json()) parses the JSON text into a JS object.
    // Once we have the data, we call renderMarkers() to plot them.
    // ============================================================
    fetch(SCRIPT_URL)
      .then(r => r.json())
      .then(data => {
        allShops = data.shops;
        renderMarkers(allShops);
        hideLoading();
      })
      .catch(err => {
        // If the fetch fails (wrong URL, network issue), show an
        // error so the user knows something went wrong.
        console.error('Failed to load shop data:', err);
        document.querySelector('#loading p').textContent = 'Could not load shops. Check the script URL.';
      });

    // ============================================================
    // RENDERING MARKERS
    //
    // This function takes an array of shops and places a chai
    // glass marker on the map for each one.
    //
    // First we remove all existing markers (in case we're
    // re-rendering after a filter change), then add fresh ones.
    //
    // marker.on('click', ...) attaches a click handler so tapping
    // a glass opens the info panel for that shop.
    // ============================================================
    function renderMarkers(shops) {
      // Remove old markers from the map
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      shops.forEach(shop => {
        // Skip shops with missing coordinates
        if (!shop.lat || !shop.lng) return;

        const marker = L.marker([shop.lat, shop.lng], { icon: chaiIcon }).addTo(map);

        marker.on('click', () => {
          selectShop(shop, marker);
        });

        markers.push(marker);
      });

      // Update the count label in the filter bar
      document.getElementById('shop-count').textContent =
        shops.length === 1 ? '1 shop' : shops.length + ' shops';
    }

    // ============================================================
    // SELECTING A SHOP
    //
    // When you tap a marker, this function:
    // 1. Resets the previously selected marker back to normal size
    // 2. Makes the tapped marker larger (selected state)
    // 3. Populates the info panel with that shop's details
    // 4. Slides the panel up into view
    // ============================================================
    function selectShop(shop, marker) {
      // Reset previous selection
      if (selectedMarker) selectedMarker.setIcon(chaiIcon);

      // Highlight new selection
      marker.setIcon(chaiIconSelected);
      selectedMarker = marker;
      activeShop = shop;

      // Fill in the panel
      document.getElementById('panel-name').textContent = shop.name;
      document.getElementById('panel-location').textContent =
        [shop.area, shop.city, shop.state].filter(Boolean).join(', ');

      document.getElementById('taste-stars').innerHTML = starsFor(shop.taste);
      document.getElementById('taste-num').textContent = shop.taste + ' / 5';
      document.getElementById('vibe-stars').innerHTML = starsFor(shop.vibe);
      document.getElementById('vibe-num').textContent = shop.vibe + ' / 5';

      // Set the Google Maps link
      const gmapsBtn = document.getElementById('gmaps-btn');
      if (shop.gmaps) {
        gmapsBtn.href = shop.gmaps;
        gmapsBtn.style.display = 'block';
      } else {
        gmapsBtn.style.display = 'none';
      }

      // Hide any previous route info
      document.getElementById('route-row').classList.remove('visible');

      // Open the panel by adding the 'open' class (see CSS)
      document.getElementById('info-panel').classList.add('open');

      // Pan the map to centre on the selected shop
      map.panTo([shop.lat, shop.lng]);
    }

    // ============================================================
    // STAR RATINGS
    //
    // Converts a number (e.g. 4) into filled/empty star characters
    // e.g. starsFor(4) → "★★★★☆"
    // Math.round handles half-values like 3.5 → 4
    // ============================================================
    function starsFor(n) {
  const val = Number(n);
  let html = '';
  for (let i = 1; i <= 5; i++) {
    if (val >= i) {
      html += '<span style="color:#C8874A">★</span>';
    } else if (val >= i - 0.5) {
      html += '<span style="background:linear-gradient(to right,#C8874A 50%,#ddd 50%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">★</span>';
    } else {
      html += '<span style="color:#ddd">★</span>';
    }
  }
  return html;
}

    // ============================================================
    // CLOSING THE PANEL
    // ============================================================
    function closePanel() {
      document.getElementById('info-panel').classList.remove('open');
      if (selectedMarker) selectedMarker.setIcon(chaiIcon);
      selectedMarker = null;
      activeShop = null;
      if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
    }

    // Close panel when tapping the map background
    map.on('click', closePanel);

    // ============================================================
    // FILTERING
    //
    // When either slider moves, we re-filter allShops to only
    // those where taste >= tasteMin AND vibe >= vibeMin,
    // then re-render the markers.
    //
    // allShops never changes — it always holds the full list.
    // We just pass a filtered subset to renderMarkers().
    // ============================================================
    const tasteSlider = document.getElementById('taste-filter');
    const vibeSlider = document.getElementById('vibe-filter');

    tasteSlider.addEventListener('input', applyFilters);
    vibeSlider.addEventListener('input', applyFilters);

    function applyFilters() {
      const tasteMin = Number(tasteSlider.value);
      const vibeMin = Number(vibeSlider.value);

      document.getElementById('taste-val').textContent = tasteMin;
      document.getElementById('vibe-val').textContent = vibeMin;

      const filtered = allShops.filter(s =>
        Number(s.taste) >= tasteMin && Number(s.vibe) >= vibeMin
      );

      closePanel();
      renderMarkers(filtered);
    }

    // ============================================================
    // GPS — FIND ME
    //
    // navigator.geolocation is the browser API for GPS.
    // getCurrentPosition() asks the user for permission and
    // then returns their coordinates.
    //
    // We place a blue circle marker at their location.
    // L.circleMarker draws a coloured circle (not an image icon).
    // ============================================================
    function locateMe() {
      if (!navigator.geolocation) {
        alert('Location not supported in this browser.');
        return;
      }
      navigator.geolocation.getCurrentPosition(pos => {
        const { latitude: lat, longitude: lng } = pos.coords;

        // Remove old user marker if it exists
        if (userMarker) map.removeLayer(userMarker);

        userMarker = L.circleMarker([lat, lng], {
          radius: 9,
          fillColor: '#4A90D9',
          fillOpacity: 1,
          color: 'white',
          weight: 2.5
        }).addTo(map);

        map.setView([lat, lng], 14);
      }, () => {
        alert('Could not get your location. Please allow location access.');
      });
    }

    // ============================================================
    // ROUTE — GET WALKING ROUTE
    //
    // We call the OSRM public routing API (free, no key needed).
    // It returns a GeoJSON LineString of the walking path between
    // your location and the selected shop.
    //
    // L.geoJSON() draws that path as a dashed line on the map.
    // We also calculate distance and walking time and show them
    // in the route row inside the info panel.
    //
    // Walking speed assumed: 5 km/h (standard estimate)
    // ============================================================
    async function getRoute() {
      if (!activeShop) return;

      if (!userMarker) {
        alert('Tap ⊙ first to find your location.');
        return;
      }

      const userLatLng = userMarker.getLatLng();
      const url = `https://router.project-osrm.org/route/v1/foot/` +
        `${userLatLng.lng},${userLatLng.lat};${activeShop.lng},${activeShop.lat}` +
        `?overview=full&geometries=geojson`;

      try {
        const res = await fetch(url);
        const data = await res.json();
        const route = data.routes[0];

        // Distance comes back in metres — convert to km
        const distKm = (route.distance / 1000).toFixed(1);
        // Duration comes back in seconds — convert to minutes
        const mins = Math.round(route.duration / 60);
        const timeStr = mins >= 60
          ? `${Math.floor(mins / 60)}h ${mins % 60}m`
          : `${mins} min`;

        document.getElementById('route-dist').textContent = distKm + ' km';
        document.getElementById('route-time').textContent = timeStr;
        document.getElementById('route-row').classList.add('visible');

        // Draw the route on the map
        if (routeLine) map.removeLayer(routeLine);
        routeLine = L.geoJSON(route.geometry, {
          style: { color: '#4A90D9', weight: 3, opacity: 0.85, dashArray: '6, 5' }
        }).addTo(map);

        // Fit the map to show both your location and the shop
        const coords = route.geometry.coordinates;
        const bounds = L.latLngBounds(coords.map(c => [c[1], c[0]]));
        map.fitBounds(bounds, { padding: [60, 60] });

      } catch (e) {
        alert('Could not fetch route. Check your internet connection.');
      }
    }

    // ============================================================
    // HIDE LOADING SCREEN
    //
    // Once data is loaded we fade out the loading overlay.
    // setTimeout with 0ms defers execution to after the current
    // paint cycle so the map is visible before we remove the
    // overlay — prevents a flash of unstyled content.
    // ============================================================
    function hideLoading() {
      setTimeout(() => {
        const el = document.getElementById('loading');
        el.style.opacity = '0';
        setTimeout(() => el.style.display = 'none', 400);
      }, 300);
    }
  </script>
</body>
</html>
