<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Find Chaaya</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: #fdf8f2;
      color: #2a1a0a;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ───────────────────────────────────────────── */
    header {
      padding: 10px 16px;
      background: #fdf8f2;
      border-bottom: 1px solid #e8d8c4;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-text { flex: 1; }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #1a4a3a;
    }

    header p {
  font-size: 11px;
  color: #c9a84c;
  margin-top: 1px;
  font-style: italic;
  font-weight: 700;
}

    /* ── Header buttons ───────────────────────────────────── */
    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    /* Filter toggle — outlined dark green */
    .btn-filter {
      background: none;
      border: 1.5px solid #1a4a3a;
      border-radius: 20px;
      padding: 6px 13px;
      font-size: 12px;
      font-weight: 700;
      color: #1a4a3a;
      cursor: pointer;
      font-family: 'Georgia', serif;
      white-space: nowrap;
    }

    .btn-filter.active {
      background: #1a4a3a;
      color: #fdf8f2;
    }

    /* Locate — solid dark, primary action */
    .btn-locate {
      background: #2a1a0a;
      border: none;
      border-radius: 20px;
      padding: 7px 13px;
      font-size: 12px;
      font-weight: 700;
      color: #fdf8f2;
      cursor: pointer;
      font-family: 'Georgia', serif;
      white-space: nowrap;
    }

    .btn-locate:active { background: #1a4a3a; }

    /* ── Filter panel ─────────────────────────────────────────
       Slides down from header. Uses pill buttons instead of
       sliders — each pill is a minimum star value. Tapping
       "Any" resets. Much clearer UX than a slider.           */
    #filter-panel {
      background: #fdf8f2;
      border-bottom: 1px solid #e8d8c4;
      flex-shrink: 0;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s ease, padding 0.25s ease;
      padding: 0 16px;
    }

    #filter-panel.open {
      max-height: 120px;
      padding: 10px 16px;
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .filter-row:last-child { margin-bottom: 0; }

    .filter-label {
      font-size: 11px;
      font-weight: 700;
      color: #8B6340;
      width: 36px;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Pill buttons for star selection */
    .filter-pills { display: flex; gap: 4px; }

.filter-pill {
  font-size: 11px;
  font-family: 'Georgia', serif;
  padding: 3px 9px;
      border-radius: 20px;
      border: 1px solid #e8d8c4;
      background: none;
      color: #5a3e28;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.12s;
    }

    .filter-pill.active {
      background: #1a4a3a;
      border-color: #1a4a3a;
      color: #fdf8f2;
    }

    .filter-pill.any-pill.active {
      background: #c9a84c;
      border-color: #c9a84c;
      color: #2a1a0a;
    }

    /* ── Count bar ────────────────────────────────────────── */
    #count-bar {
      background: #f5ede0;
      padding: 5px 16px;
      font-size: 12px;
      color: #8B6340;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 5px;
      border-bottom: 1px solid #e8d8c4;
    }

    #count-bar.empty {
      background: #fdf0e8;
      color: #c0522a;
    }

    #shop-count { font-weight: 700; }
    #filter-active-label { font-style: italic; opacity: 0.7; }

    /* ── Map ──────────────────────────────────────────────── */
    #map { width: 100%; height: 100%; }
    .leaflet-marker-icon { background: none !important; border: none !important; }

    /* ── Empty state ──────────────────────────────────────── */
    #empty-state {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #fdf8f2;
      border: 1px solid #e8d8c4;
      border-radius: 12px;
      padding: 16px 24px;
      text-align: center;
      z-index: 500;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    #empty-state p { font-size: 14px; color: #2a1a0a; font-weight: 700; }
    #empty-state span { font-size: 12px; color: #8B6340; display: block; margin-top: 4px; }

    /* ── Bottom info panel ────────────────────────────────── */
    #info-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fdf8f2;
      border-top: 2px solid #1a4a3a;
      border-radius: 16px 16px 0 0;
      padding: 16px 20px 28px;
      z-index: 1000;
      transform: translateY(100%);
      transition: transform 0.28s ease;
      max-width: 600px;
      margin: 0 auto;
    }

    #info-panel.open { transform: translateY(0); }

    .panel-handle {
      width: 36px;
      height: 4px;
      background: #d4c4b0;
      border-radius: 2px;
      margin: 0 auto 14px;
    }

    #panel-name { font-size: 18px; font-weight: 700; color: #1a4a3a; }
    #panel-location { font-size: 13px; color: #8B6340; margin-top: 2px; }

    #panel-ratings { display: flex; gap: 10px; }

    .rating-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #f5ede0;
      border-radius: 10px;
      padding: 8px 16px;
      min-width: 80px;
    }

    .rating-badge .badge-label {
      font-size: 10px;
      color: #8B6340;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .rating-badge .stars { font-size: 16px; margin-top: 3px; letter-spacing: 1px; }
    .rating-badge .rating-num { font-size: 11px; color: #a0856a; margin-top: 1px; }

    #panel-actions { display: flex; gap: 10px; margin-top: 14px; }

    .btn {
      flex: 1;
      padding: 11px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-family: 'Georgia', serif;
    }

    .btn-primary { background: #1a4a3a; color: #fdf8f2; }
    .btn-secondary { background: #f5ede0; color: #5a3e28; }

    #route-row { display: none; gap: 10px; margin-top: 10px; }
    #route-row.visible { display: flex; }

    .route-box {
      flex: 1;
      background: #f5ede0;
      border-radius: 10px;
      padding: 8px 12px;
      text-align: center;
    }

    .route-box .route-label { font-size: 10px; color: #8B6340; text-transform: uppercase; letter-spacing: 0.5px; }
    .route-box .route-val { font-size: 16px; font-weight: 700; color: #2a1a0a; margin-top: 2px; }

    #route-note { display: none; font-size: 11px; color: #a0856a; margin-top: 6px; font-style: italic; }

    #panel-top {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
#panel-top-text {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
#panel-photo {
  width: 38%;
  height: 160px;
  max-height: 160px;
  border-radius: 10px;
  object-fit: cover;
  object-position: center;
  display: none;
  flex-shrink: 0;
  border: 1px solid #e8d8c4;
  cursor: pointer;
}

    /* ── Loading ──────────────────────────────────────────── */
    #loading {
      position: fixed;
      inset: 0;
      background: #fdf8f2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    #loading h2 { font-size: 24px; color: #1a4a3a; margin-bottom: 6px; }
    #loading p { font-size: 13px; color: #8B6340; font-style: italic; }

    #loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e8d8c4;
      border-top-color: #1a4a3a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .leaflet-control-attribution { font-size: 9px !important; }
  </style>
</head>

<body>

  <div id="loading">
    <div id="loading-spinner"></div>
    <h2>Find Chaaya</h2>
    <p>by Le Chaaya</p>
  </div>

  <header>
    <div class="header-text">
      <h1>Find Chaaya</h1>
      <p>by Le Chaaya</p>
    </div>
    <div class="header-actions">
      <button class="btn-filter" id="filter-toggle-btn" onclick="toggleFilter()">Filter</button>
      <button class="btn-locate" id="locate-btn" onclick="locateMe()">Find my location</button>
    </div>
  </header>

  <!-- Filter panel: pill buttons, one row per rating type -->
  <div id="filter-panel">
    <div class="filter-row">
      <span class="filter-label">Taste</span>
      <div class="filter-pills" id="taste-pills">
        <button class="filter-pill any-pill active" onclick="setPill('taste', 0)">Any</button>
        <button class="filter-pill" onclick="setPill('taste', 1)">1★+</button>
        <button class="filter-pill" onclick="setPill('taste', 2)">2★+</button>
        <button class="filter-pill" onclick="setPill('taste', 3)">3★+</button>
        <button class="filter-pill" onclick="setPill('taste', 4)">4★+</button>
        <button class="filter-pill" onclick="setPill('taste', 5)">5★</button>
      </div>
    </div>
    <div class="filter-row">
      <span class="filter-label">Vibe</span>
      <div class="filter-pills" id="vibe-pills">
        <button class="filter-pill any-pill active" onclick="setPill('vibe', 0)">Any</button>
        <button class="filter-pill" onclick="setPill('vibe', 1)">1★+</button>
        <button class="filter-pill" onclick="setPill('vibe', 2)">2★+</button>
        <button class="filter-pill" onclick="setPill('vibe', 3)">3★+</button>
        <button class="filter-pill" onclick="setPill('vibe', 4)">4★+</button>
        <button class="filter-pill" onclick="setPill('vibe', 5)">5★</button>
      </div>
    </div>
  </div>

  <div id="count-bar">
    <span id="shop-count">Loading...</span>
    <span id="filter-active-label"></span>
  </div>

  <div style="position:relative; flex:1; min-height:0;">
    <div id="map" style="width:100%; height:100%;"></div>
    <div id="empty-state">
      <p>No shops found</p>
      <span>Try relaxing your filters</span>
    </div>
  </div>

  <div id="info-panel">
    <div class="panel-handle"></div>
    <div id="panel-top">
      <div id="panel-top-text">
        <div id="panel-name"></div>
        <div id="panel-location"></div>
        <div id="panel-ratings">
          <div class="rating-badge">
            <span class="badge-label">Taste</span>
            <span class="stars" id="taste-stars"></span>
            <span class="rating-num" id="taste-num"></span>
          </div>
          <div class="rating-badge">
            <span class="badge-label">Vibe</span>
            <span class="stars" id="vibe-stars"></span>
            <span class="rating-num" id="vibe-num"></span>
          </div>
        </div>
      </div>
      <img id="panel-photo" src="" alt="" onclick="openPhoto()" />
    </div>
    <div id="route-row">
      <div class="route-box">
        <div class="route-label">Distance</div>
        <div class="route-val" id="route-dist">—</div>
      </div>
      <div class="route-box">
        <div class="route-label">Walking</div>
        <div class="route-val" id="route-time">—</div>
      </div>
    </div>
    <p id="route-note">Walking time is approximate. Actual time may vary.</p>
    <div id="panel-actions">
      <a id="gmaps-btn" href="#" target="_blank" class="btn btn-primary">Open in Maps</a>
      <button class="btn btn-secondary" onclick="getRoute()">Get route</button>
      <button class="btn btn-secondary" onclick="closePanel()">Close</button>
    </div>
  </div>

  <script>
    // ============================================================
    // CONFIGURATION
    // ============================================================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwo1VyT3C4QKiW1absjR5BdjTh7I4lW2q_tMii3IlSSh42cPotMNBl6z4DaBAu0gEIR/exec';

    // ============================================================
    // MARKER
    // Image is saved at 2x (127x160) for Retina sharpness.
    // Display size is 63x80. iconAnchor at bottom-centre tip.
    // ============================================================
    function makeIcon(selected) {
      const w = selected ? 52 : 40;
const h = selected ? 66 : 51;
      return L.divIcon({
        className: '',
        html: `<img src="marker.png" width="${w}" height="${h}" style="object-fit:contain;filter:drop-shadow(0 3px 8px rgba(0,0,0,0.35))${selected ? ' brightness(1.1)' : ''};" />`,
        iconSize: [w, h],
        iconAnchor: [w / 2, h],
        popupAnchor: [0, -h]
      });
    }

    const chaiIcon = makeIcon(false);
    const chaiIconSelected = makeIcon(true);

    // ============================================================
    // MAP — CartoDB Positron: muted, minimal, low visual noise
    // ============================================================
    const map = L.map('map', { zoomControl: true }).setView([9.98, 76.3], 12);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap © CARTO'
    }).addTo(map);

    // ============================================================
    // STATE
    // ============================================================
    let allShops = [], markers = [], selectedMarker = null;
    let userMarker = null, routeLine = null, activeShop = null;
    let tasteMin = 0, vibeMin = 0;

    // ============================================================
    // FETCH
    // ============================================================
    fetch(SCRIPT_URL)
      .then(r => r.json())
      .then(data => { allShops = data.shops; renderMarkers(allShops); hideLoading(); })
      .catch(() => {
        document.querySelector('#loading p').textContent = 'Could not load shops. Check the script URL.';
      });

    // ============================================================
    // RENDER MARKERS
    // ============================================================
    function renderMarkers(shops) {
      markers.forEach(m => map.removeLayer(m));
      markers = [];
      shops.forEach(shop => {
        if (!shop.lat || !shop.lng) return;
        const marker = L.marker([shop.lat, shop.lng], { icon: chaiIcon }).addTo(map);
        marker.on('click', () => selectShop(shop, marker));
        markers.push(marker);
      });
      const n = shops.length;
      const countBar = document.getElementById('count-bar');
      document.getElementById('shop-count').textContent =
        n === 0 ? 'No shops match your filter' : n === 1 ? '1 shop found' : `${n} shops found`;
      countBar.classList.toggle('empty', n === 0);
document.getElementById('empty-state').style.display = n === 0 ? 'block' : 'none';

      if (n > 0 && (tasteMin > 0 || vibeMin > 0)) {
        const validShops = shops.filter(s => s.lat && s.lng);
        if (validShops.length === 1) {
          map.setView([validShops[0].lat, validShops[0].lng], 15);
        } else {
          const bounds = L.latLngBounds(validShops.map(s => [s.lat, s.lng]));
          map.fitBounds(bounds, { padding: [60, 60], maxZoom: 15 });
        }
      }
    }

    // ============================================================
    // SELECT SHOP
    // ============================================================
    function selectShop(shop, marker) {
      if (selectedMarker) selectedMarker.setIcon(chaiIcon);
      marker.setIcon(chaiIconSelected);
      selectedMarker = marker;
      activeShop = shop;

      document.getElementById('panel-name').textContent = shop.name;
      document.getElementById('panel-location').textContent =
        [shop.area, shop.city, shop.state].filter(Boolean).join(', ');
      document.getElementById('taste-stars').innerHTML = starsFor(shop.taste);
      document.getElementById('taste-num').textContent = shop.taste + ' / 5';
      document.getElementById('vibe-stars').innerHTML = starsFor(shop.vibe);
      document.getElementById('vibe-num').textContent = shop.vibe + ' / 5';

      const gmapsBtn = document.getElementById('gmaps-btn');
      gmapsBtn.href = shop.gmaps || '#';
      gmapsBtn.style.display = shop.gmaps ? 'block' : 'none';

      const photoEl = document.getElementById('panel-photo');
      if (shop.photo) {
        photoEl.src = shop.photo;
        photoEl.style.display = 'block';
      } else {
        photoEl.style.display = 'none';
      }
      document.getElementById('route-row').classList.remove('visible');
      document.getElementById('route-note').style.display = 'none';
      document.getElementById('info-panel').classList.add('open');
      map.panTo([shop.lat, shop.lng]);
    }

    // ============================================================
    // HALF-STAR RENDERER
    // ============================================================
    function starsFor(n) {
      const val = Number(n);
      let html = '';
      for (let i = 1; i <= 5; i++) {
        if (val >= i) {
          html += '<span style="color:#c9a84c">★</span>';
        } else if (val >= i - 0.5) {
          html += '<span style="background:linear-gradient(to right,#c9a84c 50%,#ddd 50%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">★</span>';
        } else {
          html += '<span style="color:#ddd">★</span>';
        }
      }
      return html;
    }

    // ============================================================
    // CLOSE PANEL
    // ============================================================
    function closePanel() {
      document.getElementById('info-panel').classList.remove('open');
      if (selectedMarker) selectedMarker.setIcon(chaiIcon);
      selectedMarker = null;
      activeShop = null;
      if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
    }

    map.on('click', closePanel);

    // ============================================================
    // FILTER TOGGLE
    // ============================================================
    function toggleFilter() {
      const panel = document.getElementById('filter-panel');
      const btn = document.getElementById('filter-toggle-btn');
      panel.classList.toggle('open');
      btn.classList.toggle('active', panel.classList.contains('open'));
    }

    // ============================================================
    // PILL FILTER
    // setPill(type, val) highlights the tapped pill, clears the
    // rest, updates the min value, and re-renders markers.
    // ============================================================
    function setPill(type, val) {
      const container = document.getElementById(`${type}-pills`);
      container.querySelectorAll('.filter-pill').forEach((pill, i) => {
        pill.classList.toggle('active', i === val);
      });

      if (type === 'taste') tasteMin = val;
      else vibeMin = val;

      applyFilters();
    }

    function applyFilters() {
      closePanel();
      const filtered = allShops.filter(s =>
        Number(s.taste) >= tasteMin && Number(s.vibe) >= vibeMin
      );
      renderMarkers(filtered);
      const isFiltered = tasteMin > 0 || vibeMin > 0;
      document.getElementById('filter-active-label').textContent =
        isFiltered ? '· filters active' : '';
    }

    // ============================================================
    // LOCATE
    // ============================================================
    function locateMe() {
      const btn = document.getElementById('locate-btn');
      btn.textContent = 'Locating...';
      if (!navigator.geolocation) {
        alert('Location not supported in this browser.');
        btn.textContent = 'Find my location';
        return;
      }
      navigator.geolocation.getCurrentPosition(pos => {
        const { latitude: lat, longitude: lng } = pos.coords;
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.circleMarker([lat, lng], {
          radius: 9, fillColor: '#1a4a3a', fillOpacity: 1,
          color: 'white', weight: 2.5
        }).addTo(map);
        map.setView([lat, lng], 14);
        btn.textContent = 'Location found';
        setTimeout(() => btn.textContent = 'Find my location', 3000);
      }, () => {
        alert('Could not get your location. Please allow location access.');
        btn.textContent = 'Find my location';
      });
    }

    // ============================================================
    // ROUTE
    // ============================================================
    async function getRoute() {
      if (!activeShop || !userMarker) {
        alert('Tap "Find my location" first.');
        return;
      }
      const userLatLng = userMarker.getLatLng();
      const url = `https://router.project-osrm.org/route/v1/foot/` +
        `${userLatLng.lng},${userLatLng.lat};${activeShop.lng},${activeShop.lat}` +
        `?overview=full&geometries=geojson`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        const route = data.routes[0];
        const distKm = (route.distance / 1000).toFixed(1);
        const mins = Math.max(1, Math.ceil((route.distance / 1000) / 4.8 * 60));
        const timeStr = mins >= 60 ? `~${Math.floor(mins/60)}h ${mins%60}m` : `~${mins} min`;
        document.getElementById('route-dist').textContent = distKm + ' km';
        document.getElementById('route-time').textContent = timeStr;
        document.getElementById('route-row').classList.add('visible');
        document.getElementById('route-note').style.display = 'block';
        if (routeLine) map.removeLayer(routeLine);
        routeLine = L.geoJSON(route.geometry, {
          style: { color: '#1a4a3a', weight: 3, opacity: 0.85, dashArray: '6, 5' }
        }).addTo(map);
        const coords = route.geometry.coordinates;
        map.fitBounds(L.latLngBounds(coords.map(c => [c[1], c[0]])), { padding: [60, 60] });
      } catch {
        alert('Could not fetch route. Check your internet connection.');
      }
    }

    // ============================================================
    // LOADING
    // ============================================================
    function openPhoto() {
      if (activeShop && activeShop.photo) window.open(activeShop.photo, '_blank');
    }
    
    function hideLoading() {
      setTimeout(() => {
        const el = document.getElementById('loading');
        el.style.opacity = '0';
        setTimeout(() => el.style.display = 'none', 400);
      }, 300);
    }
  </script>
</body>
</html>
